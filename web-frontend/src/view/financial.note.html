<!doctype html>
<html lang="ko" theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Note</title>
    <link rel="icon" type="image/png" href="./favicon/flay.png" />
    <!-- HtmlWebpackPlugin이 자동으로 CSS와 JS를 주입합니다 -->
  </head>
  <body>
    <div class="fn-page">
      <!-- 헤더 -->
      <header class="fn-page-header">
        <span class="fn-header-title">💰 Financial Note</span>
        <button id="fn-portfolio-btn" class="fn-btn">📊 포트폴리오</button>
        <button id="fn-manage-btn" class="fn-btn">⚙️ 기관/계좌 관리</button>
      </header>

      <!-- 메인 영역: 엑셀형 자산 테이블 -->
      <div class="fn-main-area">
        <fn-asset-table></fn-asset-table>
      </div>

      <!-- 자산 추이 차트 -->
      <section class="fn-chart-area">
        <fn-snapshot-chart></fn-snapshot-chart>
      </section>
    </div>
  </body>
</html>
