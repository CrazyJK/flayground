<!doctype html>
<html lang="en" theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flay map</title>
    <link rel="icon" type="image/png" href="./favicon/flay_2.png" />
    <!-- HtmlWebpackPlugin이 자동으로 CSS와 JS를 주입합니다 -->
  </head>
  <body>
    <map id="treemap-studio" class="treemap active"></map>
    <map id="treemap-actress" class="treemap"></map>
    <map id="treemap-tag" class="treemap"></map>
    <div id="controls">
      <div id="tabs">
        <button class="tab active" data-tab="studio">Studio</button>
        <button class="tab" data-tab="actress">Actress</button>
        <button class="tab" data-tab="tag">Tag</button>
      </div>
      <input id="search" type="search" autocomplete="off" />
    </div>
  </body>
</html>
