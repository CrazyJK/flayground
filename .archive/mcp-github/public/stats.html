<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Models 통계</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        padding: 24px;
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        color: #e6edf3;
        margin-bottom: 8px;
      }

      .meta {
        font-size: 0.8rem;
        color: #6e7681;
        margin-bottom: 20px;
      }

      .meta span {
        color: #58a6ff;
        font-weight: 500;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }

      thead th {
        text-align: left;
        padding: 10px 14px;
        background: #161b22;
        color: #8b949e;
        font-weight: 600;
        border-bottom: 1px solid #30363d;
        white-space: nowrap;
      }

      tbody tr:hover {
        background: #161b22;
      }

      tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid #21262d;
        color: #c9d1d9;
      }

      td.model {
        font-weight: 600;
        color: #79c0ff;
      }

      td.error {
        color: #f85149;
        font-weight: 600;
      }

      td.slow {
        color: #d29922;
      }

      td.success {
        color: #3fb950;
      }

      td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .empty {
        padding: 40px;
        text-align: center;
        color: #6e7681;
        font-size: 0.9rem;
      }

      .error-msg {
        padding: 12px 16px;
        background: #2d1414;
        border: 1px solid #6e1b1b;
        border-radius: 6px;
        color: #f85149;
        font-size: 0.85rem;
        margin-bottom: 16px;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .badge-green {
        background: #1b3a2a;
        color: #3fb950;
      }

      .badge-red {
        background: #3d1414;
        color: #f85149;
      }

      .conn-ok {
        color: #3fb950;
      }

      .conn-err {
        color: #f85149;
      }

      .conn-wait {
        color: #d29922;
      }

      .badge-gray {
        background: #21262d;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <h1>📈 GitHub Models 통계</h1>
    <div class="meta">마지막 갱신: <span id="lastUpdated">-</span> &nbsp;|&nbsp; <span id="connStatus">연결 중...</span></div>

    <div id="errorMsg" class="error-msg" style="display: none"></div>

    <div id="content">
      <div class="empty">데이터를 불러오는 중...</div>
    </div>

    <script>
      function msFormat(ms) {
        if (!ms) return '-';
        return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms';
      }

      function renderStats(stats) {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ko-KR');

        const entries = Object.entries(stats);
        if (entries.length === 0) {
          document.getElementById('content').innerHTML = '<div class="empty">아직 요청 데이터가 없습니다</div>';
          return;
        }

        // 요청수 기준 내림차순 정렬
        entries.sort((a, b) => b[1].requests - a[1].requests);

        const rows = entries
          .map(([model, s]) => {
            const successRate = s.requests > 0 ? Math.round((s.success / s.requests) * 100) : 0;
            const rateBadge = s.errors === 0 ? `<span class="badge badge-green">${successRate}%</span>` : s.success === 0 ? `<span class="badge badge-red">${successRate}%</span>` : `<span class="badge badge-gray">${successRate}%</span>`;

            return `
            <tr>
              <td class="model">${model}</td>
              <td class="num">${s.requests.toLocaleString()}</td>
              <td class="num success">${s.success.toLocaleString()}</td>
              <td class="num ${s.errors > 0 ? 'error' : ''}">${s.errors.toLocaleString()}</td>
              <td class="num">${rateBadge}</td>
              <td class="num">${msFormat(s.avgMs)}</td>
              <td class="num">${msFormat(s.maxMs)}</td>
              <td class="num ${s.slowCount > 0 ? 'slow' : ''}">${s.slowCount}</td>
            </tr>`;
          })
          .join('');

        document.getElementById('content').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>모델</th>
                <th style="text-align:right">요청수</th>
                <th style="text-align:right">성공</th>
                <th style="text-align:right">오류</th>
                <th style="text-align:right">성공률</th>
                <th style="text-align:right">평균 응답</th>
                <th style="text-align:right">최대 응답</th>
                <th style="text-align:right">10초+</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      function connect() {
        const es = new EventSource('/api/stats/stream');
        const statusEl = document.getElementById('connStatus');

        es.onopen = () => {
          statusEl.textContent = '● 실시간 연결됨';
          statusEl.className = 'conn-ok';
        };

        es.onmessage = (e) => {
          try {
            renderStats(JSON.parse(e.data));
          } catch {}
        };

        es.onerror = () => {
          statusEl.textContent = '● 연결 끊김 - 재연결 중...';
          statusEl.className = 'conn-err';
        };
      }

      connect();
    </script>
  </body>
</html>
